<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MA Town Explorer</title>
</head>
<body>

  <h1>MA Town Explorer</h1>

  <div id="biggest"></div>

  <input type="text" id="search" placeholder="Search towns by name..." oninput="filterTowns()">
  <p id="status"></p>
  <ul id="list"></ul>

  <script>
    let allTowns = [];

    async function loadTowns() {
      document.getElementById('status').textContent = 'Loading...';
      try {
        const response = await fetch('https://oim.108122.xyz/mass');
        const data = await response.json();
        allTowns = data;

        // bonus: find largest population
        let biggest = allTowns[0];
        for (let town of allTowns) {
          if (town.population > biggest.population) biggest = town;
        }
        document.getElementById('biggest').innerHTML =
          `<strong>Largest town:</strong> ${biggest.name} — population ${biggest.population.toLocaleString()}`;

        filterTowns();
      } catch (error) {
        document.getElementById('status').textContent = 'Error loading data.';
      }
    }

    function filterTowns() {
      const search = document.getElementById('search').value.toLowerCase();
      const matches = allTowns.filter(t => t.name.toLowerCase().includes(search));
      const toShow = search === '' ? matches.slice(0, 10) : matches;

      document.getElementById('status').textContent = `${toShow.length} town(s) shown`;

      const list = document.getElementById('list');
      list.innerHTML = '';
      for (let town of toShow) {
        const li = document.createElement('li');
        li.textContent = `${town.name} — ${town.county} County — pop. ${town.population.toLocaleString()}`;
        list.appendChild(li);
      }
    }

    loadTowns();
  </script>

</body>
</html>
